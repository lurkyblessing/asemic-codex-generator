<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#141b1b">
  <title>Asemic Codex Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="[YOUR LOGO HERE]" id="logo" style="max-height:40px; width:auto; font-family:'DM Mono', monospace; font-size:12px; color:var(--ink);">
    </a>
    <p><a href="about.html" style="color:var(--quiet); text-decoration:none;">What is this?</a></p>
    <button id="new-seed">REALPHABETIZE</button>
  </header>
  <main>
    <section class="control-panel">
      <h1 id="title-text" data-text="Poems in Disguise">Poems in Disguise</h1>
      <p class="intro">A fictive script engine for poems that deserve to become artifacts. Every seed makes a new alphabet, grammar, and manuscript hand.</p>
      <label for="poem">YOUR POEM</label>
      <textarea id="poem" spellcheck="false">boy crazed
slow haze
don’t blame me for trying to pass my days

-fuckshitpoem</textarea>
      <div class="seed-row">
        <div><label for="seed">MANUSCRIPT SEED</label><input id="seed" value="seraph-1313" maxlength="28"></div>
        <button id="transmute">Transmute</button>
      </div>
      <div class="reading">
        <div class="eyebrow">02 / A FALSE READING</div>
        <p id="translation" aria-live="polite"></p>
      </div>
      <p class="grammar" id="grammar"></p>
    </section>
    <section class="artifact">
      <div class="paper-frame">
        <canvas id="codex" width="1200" height="1500" aria-label="Generated illuminated codex page"></canvas>
      </div>
      <div class="artifact-actions">
        <span>ONE PAGE · NO TRANSLATION</span>
        <button class="quiet" id="download">Export PNG</button>
      </div>
    </section>
  </main>
  <footer>Written in no known hand. Rendered entirely in your browser.</footer>
  <script src="app.js"></script>
</body>
</html>
